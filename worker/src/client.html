<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snatched XI</title>
<style>
  :root {
    --bg: #262626;
    --bg2: #1a1a1a;
    --fg: #c4c4c4;
    --fg2: #888;
    --red: #e9393f;
    --border: #444;
    --green: #2ecc71;
    --gold: #f1c40f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Departure Mono', 'Courier New', monospace;
    background: var(--bg); color: var(--fg);
    min-height: 100vh;
  }

  /* ── Layout ── */
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }
  .hidden { display: none !important; }

  /* ── Header ── */
  header { 
    border-bottom: 1px solid var(--border); padding: 16px 0;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
  }
  header h1 { color: var(--red); font-size: 1.5rem; }
  .phase-badge { 
    background: var(--bg2); color: var(--fg2); padding: 4px 12px;
    border: 1px solid var(--border); font-size: 0.8rem;
  }

  /* ── Screens ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── Lobby ── */
  .lobby-actions { text-align: center; padding: 40px 0; }
  .lobby-actions button { 
    background: var(--red); color: #fff; border: none;
    padding: 12px 32px; font-family: inherit; font-size: 1rem;
    cursor: pointer; margin: 8px;
  }
  .lobby-actions button:hover { opacity: 0.9; }
  .lobby-link { 
    margin-top: 20px; padding: 16px; background: var(--bg2);
    border: 1px solid var(--border); text-align: left;
  }
  .lobby-link a { color: var(--red); word-break: break-all; }
  .waiting { color: var(--fg2); margin-top: 12px; font-style: italic; }
  .join-form input { 
    background: var(--bg2); color: var(--fg); border: 1px solid var(--border);
    padding: 10px 16px; font-family: inherit; width: 200px; margin-right: 8px;
  }

  /* ── Blueprint ── */
  .formation-grid { 
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin: 20px 0; max-width: 500px;
  }
  .formation-btn { 
    background: var(--bg2); color: var(--fg); border: 1px solid var(--border);
    padding: 12px; font-family: inherit; cursor: pointer; text-align: center;
    font-size: 0.9rem;
  }
  .formation-btn:hover { border-color: var(--red); }
  .formation-btn.selected { 
    background: var(--red); color: #fff; border-color: var(--red);
  }
  .formation-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .locked-msg { color: var(--green); margin-top: 16px; }

  /* ── Draft ── */
  .draft-layout { display: flex; gap: 20px; }
  .draft-sidebar { 
    flex: 0 0 280px; background: var(--bg2); border: 1px solid var(--border);
    padding: 16px;
  }
  .draft-main { flex: 1; }

  .wheel-result { 
    padding: 12px; background: var(--bg2); border: 1px solid var(--gold);
    margin-bottom: 16px; text-align: center;
  }
  .wheel-result .club { font-size: 1.2rem; color: var(--gold); }
  .wheel-result .season { color: var(--fg2); font-size: 0.8rem; }

  .squad-grid { 
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 6px; margin-bottom: 16px;
  }
  .player-card { 
    background: var(--bg2); border: 1px solid var(--border);
    padding: 8px 10px; cursor: pointer; transition: border-color 0.1s;
    display: flex; flex-direction: column; gap: 2px;
  }
  .player-card:hover { border-color: var(--red); }
  .player-card.claimed { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
  .player-card.claimed-by-you { border-color: var(--green); opacity: 0.7; }
  .player-card .p-name { font-size: 0.9rem; }
  .player-card .p-pos { color: var(--fg2); font-size: 0.7rem; }
  .player-card .p-ovr { color: var(--red); font-weight: bold; font-size: 0.8rem; }
  .player-card .p-attrs { color: var(--fg2); font-size: 0.65rem; }

  .timer-bar {
    height: 4px; background: var(--border); margin-bottom: 12px;
    border-radius: 2px; overflow: hidden;
  }
  .timer-fill {
    height: 100%; background: var(--red); transition: width 0.1s linear;
  }
  .timer-text { text-align: center; font-size: 0.9rem; margin-bottom: 8px; }

  /* ── Pitch ── */
  .draft-pitch-container { flex: 0 0 320px; }
  .pitch-label { font-size: 0.8rem; color: var(--fg2); margin-bottom: 8px; text-align: center; }
  .pitch {
    position: relative; width: 300px; height: 440px;
    background: linear-gradient(to bottom, #1a3a1a 0%, #1e441e 50%, #1a3a1a 100%);
    border: 2px solid #555; border-radius: 4px;
    overflow: hidden;
  }
  .pitch::before {
    content: ''; position: absolute; top: 50%; left: 5%; right: 5%;
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  .pitch::after {
    content: ''; position: absolute; top: 5%; bottom: 5%; left: 50%;
    border-left: 1px solid rgba(255,255,255,0.15);
  }
  .pitch .circle {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 80px; height: 80px; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
  }
  .pitch .penalty-box-top {
    position: absolute; top: 5%; left: 15%; right: 15%; height: 18%;
    border: 1px solid rgba(255,255,255,0.12); border-top: none;
  }
  .pitch .penalty-box-bottom {
    position: absolute; bottom: 5%; left: 15%; right: 15%; height: 18%;
    border: 1px solid rgba(255,255,255,0.12); border-bottom: none;
  }
  .pitch-slot {
    position: absolute; transform: translate(-50%,-50%);
    width: 52px; height: 36px;
    border: 1px dashed var(--border);
    font-size: 0.6rem; text-align: center;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s;
    background: rgba(0,0,0,0.5); color: var(--fg2);
    z-index: 2;
  }
  .pitch-slot:hover { border-color: var(--fg); }
  .pitch-slot.filled { 
    border-style: solid; border-color: var(--green);
    background: rgba(46,204,113,0.1);
  }
  .pitch-slot.filled .ps-name { color: var(--fg); font-size: 0.6rem; }
  .pitch-slot.filled .ps-ovr { color: var(--red); font-size: 0.55rem; }
  .pitch-slot.valid-target { 
    border-color: var(--gold); border-style: solid;
    box-shadow: 0 0 8px rgba(241,196,15,0.4);
    animation: pulse 1s infinite;
  }
  .pitch-slot.invalid-target { opacity: 0.25; cursor: not-allowed; pointer-events: none; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 4px rgba(241,196,15,0.3); } 50% { box-shadow: 0 0 12px rgba(241,196,15,0.6); } }
  .ps-slot-name { font-size: 0.5rem; color: var(--fg2); }

  /* ── Match Result ── */
  .result-score { 
    text-align: center; font-size: 2.5rem; padding: 20px;
    color: var(--gold);
  }
  .result-stats { 
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    margin: 20px 0; text-align: center;
  }
  .stat-box { 
    background: var(--bg2); border: 1px solid var(--border); padding: 16px;
  }
  .stat-value { font-size: 1.5rem; color: var(--red); }
  .stat-label { font-size: 0.7rem; color: var(--fg2); margin-top: 4px; }

  .performer { 
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; margin-bottom: 4px; background: var(--bg2);
    border: 1px solid var(--border);
  }
  .performer .rating { 
    color: var(--gold); font-weight: bold; font-size: 1.1rem;
  }

  .winner-banner { 
    text-align: center; padding: 24px; 
    font-size: 1.5rem; color: var(--green);
  }
  .back-btn {
    background: var(--bg2); color: var(--fg); border: 1px solid var(--border);
    padding: 10px 24px; font-family: inherit; cursor: pointer; margin-top: 20px;
    display: block; margin-left: auto; margin-right: auto;
  }

  /* ── Opponent Activity ── */
  .opponent-claim { 
    padding: 8px; background: var(--bg2); border: 1px solid var(--gold);
    margin-bottom: 8px; font-size: 0.8rem; animation: fadeIn 0.3s;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .draft-layout { flex-direction: column-reverse; }
    .draft-sidebar { flex: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Snatched XI</h1>
    <span class="phase-badge" id="phaseBadge">LOBBY</span>
    <span id="connectionStatus" style="color:var(--fg2);font-size:0.8rem"></span>
  </header>

  <!-- ── LOBBY SCREEN ── -->
  <section id="lobbyScreen" class="screen active">
    <div class="lobby-actions">
      <button onclick="createLobby()">Create Lobby</button>
      <div class="join-form">
        <input id="joinLobbyId" placeholder="Lobby ID">
        <button onclick="joinLobby()">Join</button>
      </div>
      <div id="lobbyLink" class="lobby-link hidden">
        <div>Share this link with your opponent:</div>
        <a id="lobbyUrl" href="#" onclick="copyLink(event)">—</a>
        <div class="waiting" id="waitingMsg"></div>
      </div>
    </div>
  </section>

  <!-- ── BLUEPRINT SCREEN ── -->
  <section id="blueprintScreen" class="screen">
    <h2>Choose Your Formation</h2>
    <div class="formation-grid" id="formationGrid"></div>
    <button id="lockFormation" disabled 
      style="margin-top:16px;background:var(--red);color:#fff;border:none;padding:10px 24px;font-family:inherit;cursor:pointer;">
      Lock In
    </button>
    <div class="locked-msg hidden" id="lockedMsg">Formation locked — waiting for opponent...</div>
  </section>

  <!-- ── DRAFT SCREEN ── -->
  <section id="draftScreen" class="screen">
    <div class="draft-layout">
      <div class="draft-pitch-container">
        <div class="pitch-label">Your XI</div>
        <div class="pitch" id="pitch"></div>
      </div>
      <div class="draft-main">
        <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
        <div class="timer-text" id="timerText">Round 1 — 10s</div>
        <div id="opponentActivity"></div>
        <div class="wheel-result hidden" id="wheelResult">
          <div class="club" id="wheelClub"></div>
          <div class="season" id="wheelSeason"></div>
        </div>
        <div class="squad-grid" id="squadGrid"></div>
      </div>
    </div>
  </section>

  <!-- ── RESULT SCREEN ── -->
  <section id="resultScreen" class="screen">
    <div id="resultContent"></div>
    <button class="back-btn" onclick="location.reload()">Play Again</button>
  </section>
</div>

<script>
// ═══════════════════════════════════════════
// Snatched XI — Client
// ═══════════════════════════════════════════

const FORMATIONS = ['4-4-2', '4-3-3', '3-5-2', '4-2-3-1', '3-4-3', '5-3-2', '4-5-1'];
const FORMATION_SLOTS = {
  '4-4-2':   ['GK', 'LB', 'CB', 'CB', 'RB', 'LM', 'CM', 'CM', 'RM', 'ST', 'ST'],
  '4-3-3':   ['GK', 'LB', 'CB', 'CB', 'RB', 'CM', 'CM', 'CM', 'LW', 'ST', 'RW'],
  '3-5-2':   ['GK', 'CB', 'CB', 'CB', 'LWB', 'CM', 'CM', 'CM', 'RWB', 'ST', 'ST'],
  '4-2-3-1': ['GK', 'LB', 'CB', 'CB', 'RB', 'CDM', 'CDM', 'CAM', 'LM', 'RM', 'ST'],
  '3-4-3':   ['GK', 'CB', 'CB', 'CB', 'LM', 'CM', 'CM', 'RM', 'LW', 'ST', 'RW'],
  '5-3-2':   ['GK', 'LWB', 'CB', 'CB', 'CB', 'RWB', 'CM', 'CM', 'CM', 'ST', 'ST'],
  '4-5-1':   ['GK', 'LB', 'CB', 'CB', 'RB', 'LM', 'CM', 'CM', 'CM', 'RM', 'ST'],
};
// Slot positions on the pitch (x%, y%) for each formation
const PITCH_SLOTS = {
  '4-4-2':   { GK:{x:50,y:88}, LB:{x:10,y:70}, CB:{x:35,y:70}, CB2:{x:65,y:70}, RB:{x:90,y:70}, LM:{x:10,y:43}, CM:{x:35,y:43}, CM2:{x:65,y:43}, RM:{x:90,y:43}, ST:{x:40,y:15}, ST2:{x:60,y:15} },
  '4-3-3':   { GK:{x:50,y:88}, LB:{x:10,y:70}, CB:{x:35,y:70}, CB2:{x:65,y:70}, RB:{x:90,y:70}, CM:{x:22,y:43}, CM2:{x:50,y:38}, CM3:{x:78,y:43}, LW:{x:15,y:15}, ST:{x:50,y:12}, RW:{x:85,y:15} },
  '3-5-2':   { GK:{x:50,y:88}, CB:{x:22,y:70}, CB2:{x:50,y:70}, CB3:{x:78,y:70}, LWB:{x:8,y:50}, CM:{x:30,y:43}, CM2:{x:50,y:38}, CM3:{x:70,y:43}, RWB:{x:92,y:50}, ST:{x:40,y:15}, ST2:{x:60,y:15} },
  '4-2-3-1': { GK:{x:50,y:88}, LB:{x:10,y:70}, CB:{x:35,y:70}, CB2:{x:65,y:70}, RB:{x:90,y:70}, CDM:{x:35,y:50}, CDM2:{x:65,y:50}, CAM:{x:50,y:35}, LM:{x:12,y:28}, RM:{x:88,y:28}, ST:{x:50,y:12} },
  '3-4-3':   { GK:{x:50,y:88}, CB:{x:22,y:70}, CB2:{x:50,y:70}, CB3:{x:78,y:70}, LM:{x:8,y:55}, CM:{x:35,y:43}, CM2:{x:65,y:43}, RM:{x:92,y:55}, LW:{x:18,y:15}, ST:{x:50,y:12}, RW:{x:82,y:15} },
  '5-3-2':   { GK:{x:50,y:88}, LWB:{x:8,y:52}, CB:{x:22,y:70}, CB2:{x:50,y:70}, CB3:{x:78,y:70}, RWB:{x:92,y:52}, CM:{x:28,y:38}, CM2:{x:50,y:33}, CM3:{x:72,y:38}, ST:{x:40,y:15}, ST2:{x:60,y:15} },
  '4-5-1':   { GK:{x:50,y:88}, LB:{x:10,y:70}, CB:{x:35,y:70}, CB2:{x:65,y:70}, RB:{x:90,y:70}, LM:{x:8,y:45}, CM:{x:28,y:40}, CM2:{x:50,y:38}, CM3:{x:72,y:40}, RM:{x:92,y:45}, ST:{x:50,y:14} },
};
let ws = null;
let myPlayerId = null;
let lobbyId = null;
let selectedFormation = null;
let draftTimer = null;
let myTeam = [];    // [{slot, player|null}]
let currentRound = 0;
let selectedPlayerId = null;  // player card selected, waiting for slot click

// ── WebSocket Connection ──

function connect(lid, pid) {
  myPlayerId = pid;
  lobbyId = lid;
  
  // Client JS opens the WebSocket
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${proto}//${location.host}/lobby/${lid}/ws?player=${pid}`;
  
  ws = new WebSocket(wsUrl);
  ws.onopen = () => {
    document.getElementById('connectionStatus').textContent = '● connected';
    document.getElementById('connectionStatus').style.color = 'var(--green)';
    ws.send(JSON.stringify({ type: 'join_lobby', playerName: pid === 'p1' ? 'Home' : 'Away' }));
  };
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
  ws.onclose = () => {
    document.getElementById('connectionStatus').textContent = '● disconnected';
    document.getElementById('connectionStatus').style.color = 'var(--red)';
  };
  ws.onerror = () => {
    document.getElementById('connectionStatus').textContent = '● error';
    document.getElementById('connectionStatus').style.color = 'var(--red)';
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'lobby_state':
      handleLobbyState(msg);
      break;
    case 'blueprint_reveal':
      handleBlueprintReveal(msg);
      break;
    case 'wheel_spin_start':
      handleWheelSpinStart(msg);
      break;
    case 'wheel_spin_result':
      handleWheelSpinResult(msg);
      break;
    case 'wheel_spin':
      // Legacy — handled by wheel_spin_result now
      handleWheelSpin(msg);
      break;
    case 'squad_board':
      handleSquadBoard(msg);
      break;
    case 'player_claimed':
      handlePlayerClaimed(msg);
      break;
    case 'draft_complete':
      handleDraftComplete(msg);
      break;
    case 'match_result':
      handleMatchResult(msg);
      break;
    case 'error':
      console.error('Server error:', msg.message);
      document.getElementById('opponentActivity').innerHTML = 
        `<div class="opponent-claim" style="border-color:var(--red);color:var(--red)">Error: ${msg.message}</div>`;
      break;
  }
}

// ── Lobby ──

async function createLobby() {
  const res = await fetch('/api/lobby/create', { method: 'POST' });
  const data = await res.json();
  lobbyId = data.lobbyId;
  
  document.getElementById('lobbyLink').classList.remove('hidden');
  const url = `${location.origin}/?lobby=${lobbyId}`;
  document.getElementById('lobbyUrl').href = url;
  document.getElementById('lobbyUrl').textContent = url;
  document.getElementById('waitingMsg').textContent = 'Waiting for opponent to join...';
  
  connect(lobbyId, 'p1');
}

function joinLobby() {
  const id = document.getElementById('joinLobbyId').value.trim();
  if (!id) return;
  // Redirect to clean URL — the page will reload and auto-connect
  location.href = `/?lobby=${id}`;
}

function copyLink(e) {
  e.preventDefault();
  navigator.clipboard.writeText(document.getElementById('lobbyUrl').textContent);
}

// ── Screen Switching ──

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('phaseBadge').textContent = id.replace('Screen', '').toUpperCase();
}

// ── Lobby State ──

function handleLobbyState(msg) {
  if (msg.phase === 'BLUEPRINT') {
    showScreen('blueprintScreen');
    renderFormationGrid();
  } else if (msg.phase === 'DRAFT') {
    showScreen('draftScreen');
    if (msg.yourTeam) myTeam = msg.yourTeam;
    renderPitch();
  } else if (msg.phase === 'OVER' && msg.matchResult) {
    showScreen('resultScreen');
    renderResult(msg.matchResult);
  }
}

// ── Blueprint ──

function renderFormationGrid() {
  const grid = document.getElementById('formationGrid');
  grid.innerHTML = FORMATIONS.map(f => 
    `<button class="formation-btn" data-formation="${f}" onclick="selectFormation('${f}')">${f}</button>`
  ).join('');
}

function selectFormation(f) {
  selectedFormation = f;
  document.querySelectorAll('.formation-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.formation === f);
  });
  document.getElementById('lockFormation').disabled = false;
}

document.getElementById('lockFormation').addEventListener('click', () => {
  if (!selectedFormation) return;
  ws.send(JSON.stringify({ type: 'submit_blueprint', formation: selectedFormation }));
  document.getElementById('lockFormation').disabled = true;
  document.getElementById('lockedMsg').classList.remove('hidden');
  document.querySelectorAll('.formation-btn').forEach(b => b.disabled = true);
});

function handleBlueprintReveal(msg) {
  showScreen('draftScreen');
  document.getElementById('phaseBadge').textContent = 'DRAFT STARTING...';
  
  const slots = FORMATION_SLOTS[msg.yourFormation] || [];
  myTeam = slots.map(s => ({ slot: s, player: null }));
  selectedFormation = msg.yourFormation;
  renderPitch();
}

// ── Draft ──

let spinInterval = null;

function handleWheelSpinStart(msg) {
  // Kill any running timers from the previous round
  clearInterval(draftTimer);
  clearInterval(spinInterval);
  
  document.getElementById('wheelResult').classList.remove('hidden');
  document.getElementById('wheelClub').textContent = 'Spinning...';
  document.getElementById('wheelSeason').textContent = '';
  document.getElementById('wheelResult').style.borderColor = 'var(--gold)';
  document.getElementById('wheelClub').style.color = 'var(--fg2)';
  
  // Animate — flash through fake club names
  const fakeClubs = [
    'Manchester United', 'Liverpool', 'Chelsea', 'Arsenal', 'Man City',
    'Tottenham', 'Leicester City', 'Everton', 'West Ham', 'Newcastle',
    'Aston Villa', 'Leeds United', 'Southampton', 'Wolves', 'Crystal Palace',
  ];
  let i = 0;
  spinInterval = setInterval(() => {
    document.getElementById('wheelClub').textContent = fakeClubs[i % fakeClubs.length];
    document.getElementById('wheelSeason').textContent = 
      ['2014-15','2015-16','2016-17','2017-18','2018-19','2019-20','2020-21','2021-22','2022-23'][Math.floor(Math.random() * 9)];
    i++;
  }, 80);
  
  document.getElementById('opponentActivity').innerHTML = '';
  document.getElementById('squadGrid').innerHTML = '';
  document.getElementById('timerFill').style.width = '100%';
  document.getElementById('timerText').textContent = `Round ${msg.round} — Wheel spinning...`;
}

function handleWheelSpinResult(msg) {
  clearInterval(spinInterval);
  
  document.getElementById('wheelResult').style.borderColor = 'var(--red)';
  document.getElementById('wheelClub').textContent = msg.club;
  document.getElementById('wheelClub').style.color = 'var(--red)';
  document.getElementById('wheelSeason').textContent = msg.season;
  
  // Show countdown to squad reveal
  document.getElementById('timerText').textContent = `Round ${msg.round} — Squad reveal in ${msg.thinkSeconds}s...`;
  let remaining = msg.thinkSeconds;
  const fill = document.getElementById('timerFill');
  
  const countdown = setInterval(() => {
    remaining--;
    fill.style.width = (remaining / msg.thinkSeconds * 100) + '%';
    document.getElementById('timerText').textContent = `Round ${msg.round} — Squad reveal in ${remaining}s...`;
    if (remaining <= 0) clearInterval(countdown);
  }, 1000);
}

function handleWheelSpin(msg) {
  // Legacy handler — direct reveal (no animation)
  clearInterval(spinInterval);
  document.getElementById('wheelResult').classList.remove('hidden');
  document.getElementById('wheelClub').textContent = msg.club;
  document.getElementById('wheelSeason').textContent = msg.season;
  document.getElementById('opponentActivity').innerHTML = '';
}

function handleSquadBoard(msg) {
  currentRound = msg.round;
  document.getElementById('timerText').textContent = `Round ${msg.round} — ${msg.timerSeconds}s`;
  document.getElementById('wheelResult').style.borderColor = 'var(--border)';
  document.getElementById('timerFill').style.width = '100%';
  
  const grid = document.getElementById('squadGrid');
  grid.innerHTML = msg.players.map(p => {
    const attrs = [p.pace, p.shooting, p.passing, p.dribbling, p.defending, p.physicality]
      .map(v => v ?? '?').join('/');
    return `
      <div class="player-card" data-player-id="${p.id}" onclick="pickPlayer('${p.id}')">
        <div class="p-name">${p.name}</div>
        <div class="p-pos">${p.positions.join(', ')}</div>
        <div class="p-ovr">OVR ${p.overall}</div>
        <div class="p-attrs">${attrs}</div>
      </div>`;
  }).join('');
  
  // Clear any pending selection from previous round
  selectedPlayerId = null;
  
  // Start timer animation
  startDraftTimer(msg.timerSeconds);
}

function startDraftTimer(seconds) {
  clearInterval(draftTimer);
  const fill = document.getElementById('timerFill');
  const text = document.getElementById('timerText');
  const endTime = Date.now() + seconds * 1000;
  
  draftTimer = setInterval(() => {
    const remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
    const pct = (remaining / seconds) * 100;
    fill.style.width = pct + '%';
    text.textContent = `Round ${currentRound} — ${remaining}s`;
    
    if (pct < 30) fill.style.background = 'var(--gold)';
    if (remaining <= 0) clearInterval(draftTimer);
  }, 100);
}

function pickPlayer(playerId) {
  // Step 1: select the card, highlight valid pitch slots
  selectedPlayerId = playerId;
  
  // Highlight the selected card
  document.querySelectorAll('.player-card').forEach(c => c.style.outline = '');
  const card = document.querySelector(`[data-player-id="${playerId}"]`);
  if (card) card.style.outline = '2px solid var(--gold)';
  
  renderPitch();  // re-render with valid/invalid targets
}

function selectSlot(slotName) {
  if (!selectedPlayerId) return;
  
  // Step 2: send the pick with the chosen slot
  ws.send(JSON.stringify({ type: 'draft_pick', playerId: selectedPlayerId, slot: slotName }));
  selectedPlayerId = null;
}

function handlePlayerClaimed(msg) {
  const card = document.querySelector(`[data-player-id="${msg.claimedPlayer.id}"]`);
  
  if (msg.playerId === myPlayerId) {
    // I claimed it
    if (card) {
      card.classList.add('claimed-by-you');
      card.textContent = 'YOURS ✓';
    }
    // Fill the slot
    const slotName = msg.claimedPlayer.slot;
    for (const sl of myTeam) {
      if (sl.slot === slotName && !sl.player) {
        sl.player = msg.claimedPlayer;
        break;
      }
    }
    selectedPlayerId = null;
  } else {
    // Opponent claimed it
    if (card) {
      card.classList.add('claimed');
      card.textContent = 'TAKEN';
    }
    document.getElementById('opponentActivity').innerHTML = `
      <div class="opponent-claim">
        Opponent picked <strong>${msg.claimedPlayer.name}</strong> (OVR ${msg.claimedPlayer.overall})
      </div>`;
    setTimeout(() => {
      const el = document.querySelector('.opponent-claim');
      if (el) el.style.opacity = '0.5';
    }, 3000);
  }
  
  renderPitch();
}

function renderPitch() {
  const pitch = document.getElementById('pitch');
  if (!selectedFormation || !myTeam.length) {
    pitch.innerHTML = '<div class="pitch"><div class="circle"></div></div>';
    return;
  }
  
  const slots = PITCH_SLOTS[selectedFormation] || {};
  const formationSlots = FORMATION_SLOTS[selectedFormation] || [];
  
  // Get selected player's positions for slot validation
  let selectedPositions = [];
  if (selectedPlayerId) {
    const card = document.querySelector(`[data-player-id="${selectedPlayerId}"]`);
    if (card) {
      const posText = card.querySelector('.p-pos')?.textContent || '';
      selectedPositions = posText.split(',').map(s => s.trim().toUpperCase());
    }
  }
  
  // Map slot functions
  const slotNames = {}; // FIFA slot → pitch key
  for (let i = 0; i < formationSlots.length; i++) {
    const s = formationSlots[i];
    // Handle duplicate slots (CB, CB2, CB3 etc.)
    let key = s;
    let count = 0;
    for (let j = 0; j <= i; j++) {
      if (formationSlots[j] === s) count++;
    }
    if (count > 1) key = s + count;
    const pos = slots[key];
    if (pos) slotNames[s] = slotNames[s] || [];
    if (pos) slotNames[s].push({ key, pos });
  }
  
  // Find which team item corresponds to which pitch key
  let idx = {};
  for (let i = 0; i < formationSlots.length; i++) {
    const s = formationSlots[i];
    let count = 0;
    for (let j = 0; j <= i; j++) {
      if (formationSlots[j] === s) count++;
    }
    const key = count > 1 ? s + count : s;
    idx[key] = myTeam[i];
  }
  
  pitch.innerHTML = `
    <div class="circle"></div>
    <div class="penalty-box-top"></div>
    <div class="penalty-box-bottom"></div>
    ${Object.entries(slots).map(([key, pos]) => {
      const teamItem = idx[key];
      const player = teamItem?.player;
      const filled = !!player;
      
      // Determine slot state for selection
      let cls = 'pitch-slot';
      if (filled) {
        cls += ' filled';
      } else if (selectedPlayerId) {
        // Check if this slot is valid for the selected player
        const slotPos = teamItem?.slot;
        if (slotPos) {
          const valid = selectedPositions.some(sp => {
            if (sp === 'GK') return slotPos === 'GK';
            if (['CB'].includes(sp)) return slotPos === 'CB';
            if (['LB','LWB'].includes(sp)) return ['LB','LWB'].includes(slotPos);
            if (['RB','RWB'].includes(sp)) return ['RB','RWB'].includes(slotPos);
            if (['CDM'].includes(sp)) return ['CDM','CM'].includes(slotPos);
            if (['CM'].includes(sp)) return ['CM','CDM','CAM'].includes(slotPos);
            if (['CAM'].includes(sp)) return ['CAM','CM','CF'].includes(slotPos);
            if (['LM','RM'].includes(sp)) return ['LM','RM','LW','RW','CM'].includes(slotPos);
            if (['LW','RW'].includes(sp)) return ['LW','RW','LM','RM','ST','CF'].includes(slotPos);
            if (['ST'].includes(sp)) return ['ST','CF','LW','RW'].includes(slotPos);
            return sp === slotPos;
          });
          cls += valid ? ' valid-target' : ' invalid-target';
        }
      }
      
      const click = filled || (!selectedPlayerId) ? '' : `data-slot="${teamItem?.slot}"`;
      
      return `<div class="${cls}" style="left:${pos.x}%;top:${pos.y}%" ${click}>
        ${filled
          ? `<span class="ps-name">${player.slot||''}</span><span class="ps-name">${player.name||''}</span><span class="ps-ovr">${player.overall||''}</span>`
          : `<span class="ps-slot-name">${teamItem?.slot||key}</span>`
        }
      </div>`;
    }).join('')}
  `;
  
  // Bind click handlers directly (more reliable than delegation)
  pitch.querySelectorAll('.pitch-slot').forEach(slot => {
    slot.addEventListener('click', function() {
      const slotName = this.dataset.slot;
      if (slotName && selectedPlayerId && !this.classList.contains('filled')) {
        selectSlot(slotName);
      }
    });
  });
}

// ── Match Result ──

function handleDraftComplete(msg) {
  myTeam = msg.yourTeam;
  renderPitch();
  document.getElementById('timerFill').style.width = '0%';
  document.getElementById('timerText').textContent = 'Simulating match...';
  clearInterval(draftTimer);
}

function handleMatchResult(msg) {
  showScreen('resultScreen');
  renderResult(msg);
}

function renderResult(msg) {
  const isHome = myPlayerId === 'p1';
  const myScore = isHome ? msg.score.home : msg.score.away;
  const oppScore = isHome ? msg.score.away : msg.score.home;
  const myStats = isHome 
    ? { poss: msg.stats.possession.home, sot: msg.stats.shotsOnTarget.home, shots: msg.stats.totalShots.home }
    : { poss: msg.stats.possession.away, sot: msg.stats.shotsOnTarget.away, shots: msg.stats.totalShots.away };
  const oppStats = isHome
    ? { poss: msg.stats.possession.away, sot: msg.stats.shotsOnTarget.away, shots: msg.stats.totalShots.away }
    : { poss: msg.stats.possession.home, sot: msg.stats.shotsOnTarget.home, shots: msg.stats.totalShots.home };
  const myTeam = isHome ? msg.homeTeam : msg.awayTeam;
  const oppTeam = isHome ? msg.awayTeam : msg.homeTeam;
  
  // Top 5 per team
  const myTop5 = myTeam.slice(0, 5);
  const oppTop5 = oppTeam.slice(0, 5);
  
  const playerRow = (p) => {
    const pos = p.positions ? p.positions.slice(0,2).join('/') : '';
    const g = p.goals ? ` ⚽${p.goals}` : '';
    const a = p.assists ? ` 🅰${p.assists}` : '';
    return `<div class="performer">
      <span>${p.playerName} <span style="color:var(--fg2);font-size:0.7rem">${pos}</span>${g}${a}</span>
      <span class="rating">${p.rating}</span>
    </div>`;
  };
  
  const html = `
    <div class="result-score">
      ${myScore} — ${oppScore}
    </div>
    <div class="winner-banner">
      ${msg.winner === 'draw' ? "It's a Draw!" : msg.winner === myPlayerId ? 'You Win!' : 'You Lose'}
    </div>
    
    <!-- Your Team -->
    <h3 style="margin-top:24px;margin-bottom:8px;color:var(--green)">Your Team</h3>
    <div class="result-stats">
      <div class="stat-box">
        <div class="stat-value">${myStats.poss}%</div>
        <div class="stat-label">Possession</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${myStats.sot}</div>
        <div class="stat-label">Shots on Target</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${myStats.shots}</div>
        <div class="stat-label">Total Shots</div>
      </div>
    </div>
    ${myTop5.map(playerRow).join('')}
    
    <!-- Opponent -->
    <h3 style="margin-top:24px;margin-bottom:8px;color:var(--red)">Opponent</h3>
    <div class="result-stats">
      <div class="stat-box">
        <div class="stat-value">${oppStats.poss}%</div>
        <div class="stat-label">Possession</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${oppStats.sot}</div>
        <div class="stat-label">Shots on Target</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${oppStats.shots}</div>
        <div class="stat-label">Total Shots</div>
      </div>
    </div>
    ${oppTop5.map(playerRow).join('')}
  `;
  
  document.getElementById('resultContent').innerHTML = html;
  document.getElementById('phaseBadge').textContent = 'GAME OVER';
}

// ── Auto-connect from URL ──
(function() {
  const params = new URLSearchParams(location.search);
  const lobby = params.get('lobby');
  if (lobby) {
    connect(lobby, 'p2');
  }
})();

// ── Pitch slot click delegation ──
document.getElementById('pitch').addEventListener('click', function(e) {
  const slot = e.target.closest('.pitch-slot');
  if (!slot) return;
  const slotName = slot.dataset.slot;
  if (slotName && selectedPlayerId && !slot.classList.contains('filled')) {
    selectSlot(slotName);
  }
});
</script>
