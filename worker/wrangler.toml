name = "snatched-xi"
main = "src/index.ts"
compatibility_date = "2026-06-13"

# Durable Object for game lobbies
[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LobbyDO"]

# D1 database for player/squad data
[[d1_databases]]
binding = "DB"
database_name = "snatched-xi-db"
database_id = "603cab5d-1b8e-484d-afac-a0c6e21e75c2"

# Observability — invocation logs + errors
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Seed: wrangler d1 execute snatched-xi-db --remote --file ../data/output/seed_fifa23.sql

[env.production]
# Production overrides if needed
